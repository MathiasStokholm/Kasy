name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are NOT cancelled so
# that a deployment is never left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry, build artefacts, and installed binaries
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-bindgen-cli
        if: steps.cache-cargo.outputs.cache-hit != 'true'
        run: |
          VERSION=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep '^version' | sed 's/version = "\(.*\)"/\1/')
          cargo install wasm-bindgen-cli --version "${VERSION}" --locked

      - name: Build for WebAssembly
        run: cargo build --profile wasm-release --target wasm32-unknown-unknown

      - name: Generate JS bindings
        run: |
          mkdir -p dist
          wasm-bindgen \
            --out-dir dist \
            --target web \
            target/wasm32-unknown-unknown/wasm-release/kasy.wasm

      - name: Copy web assets
        run: cp index.html dist/

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
